name: B站动态监控
on:
  workflow_dispatch: # 支持手动点运行
  schedule:
    - cron: '*/5 * * * *' # 每5分钟自动跑一次监控
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # 升级到v5，消除Node20过时警告
      - name: 拉取代码
        uses: actions/checkout@v5
      - name: 配置Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖库
        run: pip install bilibili-api-python requests
      - name: 运行B站监控脚本
        env:
          # 从仓库Secrets读取密钥，不要硬写代码
          SESSDATA: ${{ secrets.SESSDATA }}
          BILI_JCT: ${{ secrets.BILI_JCT }}
          TARGET_UID: ${{ secrets.TARGET_UID }} # 要监控的UP主UID数字
          PUSH_WEBHOOK: ${{ secrets.PUSH_WEBHOOK }} # 钉钉/企业微信推送机器人链接
        run: python monitor.py
